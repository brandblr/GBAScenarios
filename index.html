<div id="formsect" style="width: 25%; float: left; line-height: 2%; z-index: 10; position: absolute; margin-left: 1%;margin-top: 1%; box-shadow: 0 0 15px rgba(240,170,0,0.7); border-radius: 5px; opacity: 0.8; background-color: white;" >

<h2> Scenario </h2>
<br>
<input type="checkbox" id="BUDbox" name="BUDbox" value="BUDYes" onchange="funcswitch()">
<label for="BUDbox"> Bengaluru Urban District</label><br>

<input type="checkbox" id="BRDbox" name="BRDbox" value="BRDYes" onchange="funcswitch()">
<label for="BRDbox"> Bengaluru Rural District</label><br>

<input type="checkbox" id="SSRVbox" name="SSRVbox" value="SSRVYes" onchange="funcswitch()">
<label for="SSRVbox"> Scenario S (RV) </label><br>

<input type="checkbox" id="SMRVbox" name="SMRVbox" value="SMRVYes" onchange="funcswitch()">
<label for="SMRVbox"> Scenario M (RV) </label><br>

<input type="checkbox" id="SLRVbox" name="SLRVbox" value="SLRVYes" onchange="funcswitch()">
<label for="SLRVbox"> Scenario L (RV) </label><br>

<input type="checkbox" id="SXLRVbox" name="SXLRVbox" value="SXLRVYes" onchange="funcswitch()">
<label for="SXLRVbox"> Scenario XL (RV) </label><br>

<input type="checkbox" id="SMGPbox" name="SMGPbox" value="SMGPYes" onchange="funcswitch()">
<label for="SMGPbox"> Scenario M (GP) </label><br>

<input type="checkbox" id="SXLGPbox" name="SXLGPbox" value="SXLGPYes" onchange="funcswitch()">
<label for="SXLGPbox"> Scenario XL (GP) </label><br>

<input type="checkbox" id="CBUAbox" name="CBUAbox" value="CBUAYes" onchange="funcswitch()">
<label for="CBUAbox"> Contiguous B-Urban Area </label><br>

<input type="checkbox" id="Villbox" name="Villbox" value="VillYes" onchange="funcswitch()">
<label for="Villbox"> Current Villages </label><br>

<input type="checkbox" id="Townbox" name="Townbox" value="TownYes" onchange="funcswitch()">
<label for="Townbox"> Current Towns </label><br>


<br> <br>
<br> <br>


<p>Background Map<select id="bgbox" class='drop' style="float: right; width: 40%" onchange="bgswitch()">
<option value="selectany">Choose the Background Map</option>
'roadmap', 'satellite', 'terrain' and 'hybrid'
<option value="roadmap">Google Road Map</option>
<option value="satellite">Google Satellite Map</option>
<option value="terrain">Google Terrain Map</option>
<option value="hybrid">Google Hybrid Map</option>
</select >
<br>
</p>
